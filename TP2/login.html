<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso - GameCenter</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
</head>
<body>
        <div class="logo-section">
            <img src="img/Logo_big.svg" alt="GameCenter" class="login-logo">
        </div>

        <div class="login-form-section">
                <h1 class="login-title">Inicia sesión</h1>
            <div class="login-frame">
                <form class="login-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Email" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="password-input-container">
                            <input type="password" id="password" placeholder="Contraseña" required>
                            <button type="button" class="password-toggle" aria-label="Mostrar contraseña">
                                <iconify-icon icon="lucide:eye"></iconify-icon>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn">Iniciar sesión</button>
                </form>
                
                <div class="register-link">
                    <p>¿No tienes una cuenta? <a href="#" class="register-text">Regístrate acá</a></p>
                </div>
                
                <div class="separator"></div>
                
                <div class="social-login">
                    <button class="social-btn facebook-btn">
                        <iconify-icon icon="ri:facebook-fill"></iconify-icon>
                        Iniciar sesión con Facebook
                    </button>
                    
                    <button class="social-btn google-btn">
                        <iconify-icon icon="material-icon-theme:google"></iconify-icon>
                        Iniciar sesión con Google
                    </button>
                </div>
            </div>
        </div>
    <script src="js/main.js"></script>
</body>
</html>
